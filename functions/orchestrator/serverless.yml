notificationsOrchestrator:
  handler: functions/orchestrator/handler.handler
  name: haul-svc-notifications-orchestrator-${sls:stage}
  description: EventBridge consumer that orchestrates all notification delivery
  memorySize: 512
  timeout: 30
  vpc:
    subnetIds: ${self:custom.env.OPENSEARCH_VPC_SUBNET_IDS, ''}
    securityGroupIds:
      - ${self:custom.env.OPENSEARCH_VPC_SECURITY_GROUP_ID, ''}
  environment:
    OPENSEARCH_ENDPOINT: ${self:custom.env.OPENSEARCH_ENDPOINT}
    EMAIL_QUEUE_URL:
      Ref: EmailChannelQueue
    PUSH_QUEUE_URL:
      Ref: PushChannelQueue
    SMS_QUEUE_URL:
      Ref: SmsChannelQueue
