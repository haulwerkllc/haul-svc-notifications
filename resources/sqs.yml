Resources:
  # ================================
  # SQS Queues for Channel Fan-out
  # ================================

  # Email Channel Queue
  EmailChannelQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: haul-notifications-email-${sls:stage}
      VisibilityTimeout: 360  # 6 minutes (6x Lambda timeout)
      MessageRetentionPeriod: 1209600  # 14 days
      RedrivePolicy:
        deadLetterTargetArn:
          Fn::GetAtt:
            - EmailChannelDLQ
            - Arn
        maxReceiveCount: 3

  EmailChannelDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: haul-notifications-email-dlq-${sls:stage}
      MessageRetentionPeriod: 1209600  # 14 days

  # Push Channel Queue
  PushChannelQueue:
