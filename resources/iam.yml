Resources:
  # ================================
  # Lambda Permissions (Resource-Based Policies)
  # ================================

  # Allow EventBridge to invoke the orchestrator Lambda
  # Source ARN constructed from known rule naming convention in Terraform
  OrchestratorEventBridgePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt NotificationsOrchestratorLambdaFunction.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !Sub arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/notifications-${sls:stage}

  # ================================
  # IAM Policies for Notification Service
  # ================================

  # Policy: Orchestrator can send to SQS queues
  OrchestratorSQSPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: haul-notifications-orchestrator-sqs-${sls:stage}
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - sqs:SendMessage
              - sqs:GetQueueUrl
            Resource:
              - Fn::GetAtt:
                  - EmailChannelQueue
                  - Arn
              - Fn::GetAtt:
                  - PushChannelQueue
                  - Arn
              - Fn::GetAtt:
                  - SmsChannelQueue
                  - Arn
      Roles:
        - Ref: IamRoleLambdaExecution
